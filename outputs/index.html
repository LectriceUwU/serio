        }));
        app.querySelectorAll('[data-action="set-tier"]').forEach((select) => select.addEventListener("change", () => {
          gameDraft.tiers[select.dataset.playerId] = Number(select.value);
          render();
        }));
        app.querySelectorAll('[data-action="set-bonus"]').forEach((checkbox) => checkbox.addEventListener("change", () => {
          if (!gameDraft.bonuses[checkbox.dataset.playerId]) gameDraft.bonuses[checkbox.dataset.playerId] = createPlayerBonuses();
          gameDraft.bonuses[checkbox.dataset.playerId][checkbox.dataset.bonus] = checkbox.checked;
          saveGameDraft();
          render();
        }));
        app.querySelector('[data-action="begin-game"]')?.addEventListener("click", () => {
          if (!gameDraft || gameDraft.selectedIds.length !== gameDraft.count) return;
          gameDraft.stage = "playing";
          gameDraft.startedAt = new Date().toISOString();
          gameDraft.lives = Object.fromEntries(gameDraft.selectedIds.map((id) => [id, 40]));
          gameDraft.counters = createCounterState(gameDraft.selectedIds);
          gameDraft.selectedIds.forEach((id) => { if (!gameDraft.tiers[id]) gameDraft.tiers[id] = 3; if (!gameDraft.bonuses[id]) gameDraft.bonuses[id] = createPlayerBonuses(); });
          gameDraft.positions = Object.fromEntries(gameDraft.selectedIds.map((id, index) => [id, index + 1]));
          gameDraft.lifeOperations = [];
          gameDraft.actionActorId = gameDraft.selectedIds.includes(playerByIdByName(currentUser)?.id) ? playerByIdByName(currentUser).id : gameDraft.selectedIds[0];
          gameDraft.planeOrder = randomActivePlanes();
          gameDraft.planeIndex = 0;
          gameDraft.planesWalked = 0;
          gameDraft.mode = "life";
          currentScreen = "game";
          saveGameDraft();
          render();
        });
        app.querySelector('[data-action="set-actor"]')?.addEventListener("change", (event) => { gameDraft.actionActorId = event.target.value; saveGameDraft(); render(); });
        app.querySelectorAll('[data-action="change-life"]').forEach((button) => button.addEventListener("click", () => applyLifeChange(button.dataset.playerId, Number(button.dataset.delta))));
        app.querySelectorAll('[data-action="open-counters"]').forEach((button) => button.addEventListener("click", () => openCountersModal(button.dataset.playerId)));
        app.querySelector('[data-action="show-planes"]')?.addEventListener("click", () => setGameMode("planes"));
        app.querySelector('[data-action="show-life"]')?.addEventListener("click", () => setGameMode("life"));
        app.querySelector('[data-action="plane-prev"]')?.addEventListener("click", () => advancePlane(-1));
        app.querySelector('[data-action="plane-next"]')?.addEventListener("click", () => advancePlane(1));
        bindGameSwipe();
        app.querySelector('[data-action="finish-game"]')?.addEventListener("click", openResultTypeModal);
        app.querySelector('[data-action="cancel-game"]')?.addEventListener("click", openCancelGameModal);
        app.querySelectorAll('[data-action="view-match"]').forEach((button) => button.addEventListener("click", () => openMatchDetails(button.dataset.matchId)));
        app.querySelectorAll('[data-action="delete-match"]').forEach((button) => button.addEventListener("click", () => openDeleteMatchModal(button.dataset.matchId)));
        app.querySelector('#ranking-name-form')?.addEventListener("submit", (event) => {
          event.preventDefault();
          const name = document.getElementById("ranking-name").value.trim();
          if (!name) { showToast("El nombre del ranking no puede estar vacío.", true); return; }
          state.rankingName = name;
          saveState();
          render();
          showToast("Nombre del ranking actualizado.");
        });
        app.querySelector('#rules-form')?.addEventListener("submit", (event) => {
          event.preventDefault();
          state.rules = document.getElementById("rules-text").value.trim() || seedRules;
          saveState();
          const note = document.getElementById("rules-note");
          note.textContent = "Reglas guardadas";
          window.setTimeout(() => { if (note) note.textContent = ""; }, 2400);
        });
      }

      function handleAddPlayer(event) {
        event.preventDefault();
        const input = document.getElementById("new-player-name");
        const error = document.getElementById("player-form-error");
        const name = input.value.trim();
        error.textContent = "";
        if (!name) { error.textContent = "Escribe un nombre para añadirlo."; return; }
        if (state.players.some((player) => player.name.toLocaleLowerCase() === name.toLocaleLowerCase())) {
          error.textContent = "Ese nombre ya existe. Prueba con otro diferente.";
          input.focus();
          return;
        }
        const newPlayer = { id: uid("player"), name, eloSecret: ELO_CONFIG.initialSecret, eloVisible: ELO_CONFIG.initialSecret - ELO_CONFIG.visibleOffset };
        state.players.push(newPlayer);
        state.statistics.players[newPlayer.id] = createPlayerStats();
        saveState();
        render();
        showToast(`${name} se ha añadido a la lista.`);
      }

      function handleAvatarUpload(input) {
        const file = input.files?.[0];
        const player = playerById(input.dataset.playerId);
        if (!file || !player) return;
        if (!file.type.startsWith("image/")) { showToast("Selecciona una imagen.", true); return; }
        if (file.size > 5 * 1024 * 1024) { showToast("La imagen debe pesar menos de 5 MB.", true); return; }
        const reader = new FileReader();
        reader.onload = () => {
          const image = new Image();
          image.onload = () => {
            const max = 320;
            const scale = Math.min(1, max / Math.max(image.width, image.height));
            const canvas = document.createElement("canvas");
            canvas.width = Math.max(1, Math.round(image.width * scale));
            canvas.height = Math.max(1, Math.round(image.height * scale));
            canvas.getContext("2d").drawImage(image, 0, 0, canvas.width, canvas.height);
            player.photo = canvas.toDataURL("image/jpeg", .82);
            saveState();
            render();
            showToast("Foto actualizada.");
          };
          image.src = reader.result;
        };
        reader.readAsDataURL(file);
      }

      function groupById(id) { return state.planes.groups.find((group) => group.id === id); }
      function planeByIds(groupId, planeId) { return groupById(groupId)?.planes.find((plane) => plane.id === planeId); }

      function handleAddGroup(event) {
        event.preventDefault();
        const input = document.getElementById("new-group-name");
        const name = input.value.trim();
        if (!name) { showToast("Escribe un nombre de grupo.", true); return; }
        if (state.planes.groups.some((group) => group.name.toLocaleLowerCase() === name.toLocaleLowerCase())) { showToast("Ese grupo ya existe.", true); return; }
        state.planes.groups.push({ id: uid("group"), name, planes: [] });
        saveState();
        render();
        showToast("Grupo creado.");
      }

      function imageFileToDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onerror = reject;
          reader.onload = () => {
            const image = new Image();
            image.onerror = reject;
            image.onload = () => {
              const max = 1200;
              const scale = Math.min(1, max / Math.max(image.width, image.height));
              const canvas = document.createElement("canvas");
              canvas.width = Math.max(1, Math.round(image.width * scale));
              canvas.height = Math.max(1, Math.round(image.height * scale));
              canvas.getContext("2d").drawImage(image, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL("image/jpeg", .84));
            };
            image.src = reader.result;
          };
          reader.readAsDataURL(file);
        });
      }

      function handlePlaneUpload(input) {
        const group = groupById(input.dataset.groupId);
        const files = [...(input.files || [])].filter((file) => file.type.startsWith("image/"));
        if (!group || !files.length) return;
        Promise.all(files.map(async (file) => ({ id: uid("plane"), name: file.name.replace(/\.[^/.]+$/, "") || "Plano", image: await imageFileToDataUrl(file), active: true }))).then((planes) => {
          group.planes.push(...planes);
          saveState();
          render();
          showToast(`${planes.length} ${planes.length === 1 ? "plano añadido" : "planos añadidos"}.`);
        }).catch(() => showToast("No se pudo cargar una de las imágenes.", true));
      }

      function togglePlane(groupId, planeId, active) {
        const plane = planeByIds(groupId, planeId);
        if (!plane) return;
        plane.active = active;
        saveState();
      }

      function renamePlane(groupId, planeId, value) {
        const plane = planeByIds(groupId, planeId);
        if (!plane) return;
        plane.name = value.trim() || "Plano";
        saveState();
      }

      function openDeletePlaneModal(groupId, planeId) {
        const plane = planeByIds(groupId, planeId);
        if (!plane) return;
        openModal(`<p class="eyebrow">Plano</p><h3>¿Eliminar ${escapeHtml(plane.name)}?</h3><div class="modal-actions"><button class="btn btn-ghost" type="button" data-modal-action="close">Cancelar</button><button class="btn btn-danger" type="button" data-modal-action="confirm-delete-plane" data-group-id="${groupId}" data-plane-id="${planeId}">Eliminar</button></div>`);
      }

      function deletePlane(groupId, planeId) {
        const group = groupById(groupId);
        if (!group) return;
        group.planes = group.planes.filter((plane) => plane.id !== planeId);
        saveState();
        closeModal();
        render();
      }

      function openDeleteGroupModal(groupId) {
        const group = groupById(groupId);
        if (!group) return;
        openModal(`<p class="eyebrow">Grupo</p><h3>¿Eliminar ${escapeHtml(group.name)}?</h3><div class="modal-actions"><button class="btn btn-ghost" type="button" data-modal-action="close">Cancelar</button><button class="btn btn-danger" type="button" data-modal-action="confirm-delete-group" data-group-id="${groupId}">Eliminar</button></div>`);
      }

      function deleteGroup(groupId) {
        state.planes.groups = state.planes.groups.filter((group) => group.id !== groupId);
        saveState();
        closeModal();
        render();
      }

      function handleEditPlayer(event, id) {
        event.preventDefault();
        const form = event.currentTarget;
        const input = form.querySelector("input");
        const name = input.value.trim();
        if (!name) { showToast("El nombre no puede estar vacío.", true); return; }
        if (state.players.some((player) => player.id !== id && player.name.toLocaleLowerCase() === name.toLocaleLowerCase())) {
          showToast("Ese nombre ya existe. Prueba con otro diferente.", true);
          input.focus();
          return;
        }
        const player = playerById(id);
        const oldName = player.name;
        player.name = name;
        saveState();
        editingPlayerId = null;
        if (currentUser === oldName) currentUser = name;
        if (sessionStorage.read() === oldName) sessionStorage.write(name);
        render();
        showToast("Nombre actualizado.");
      }

      function openDeletePlayerModal(id) {
        const player = playerById(id);
        if (!player) return;
        openModal(`<p class="eyebrow">Eliminar jugador</p><h3>¿Eliminar a ${escapeHtml(player.name)}?</h3><p class="modal-copy">El jugador desaparecerá de la lista, pero las partidas históricas conservarán su nombre y sus resultados.</p><div class="modal-actions"><button class="btn btn-ghost" type="button" data-modal-action="close">Cancelar</button><button class="btn btn-danger" type="button" data-modal-action="confirm-delete-player" data-player-id="${id}">Sí, eliminar</button></div>`);
      }

      function deletePlayer(id) {
        const player = playerById(id);
        if (!player) return;
        state.players = state.players.filter((item) => item.id !== id);
        saveState();
        closeModal();
        if (currentUser === player.name) {
          sessionStorage.clear();
          currentUser = null;
          currentScreen = "home";
          render();
          showToast("Jugador eliminado. La sesión se ha cerrado.");
        } else {
          render();
          showToast(`${player.name} se ha eliminado.`);
        }
      }

      function openResetDemoModal() {
        openModal(`<p class="eyebrow">Datos de prueba</p><h3>¿Restablecer la demo?</h3><p class="modal-copy">Se sustituirán jugadores, partidas, torneos y reglas actuales por los datos de ejemplo iniciales. Esta acción no se puede deshacer.</p><div class="modal-actions"><button class="btn btn-ghost" type="button" data-modal-action="close">Cancelar</button><button class="btn btn-danger" type="button" data-modal-action="reset-demo">Restablecer demo</button></div>`);
      }

      function resetDemo() {
        state = createDemoState();
        saveState();
        closeModal();
        if (currentUser && !state.players.some((player) => player.name === currentUser)) currentUser = state.players[0].name;
        render();
        showToast("Datos de ejemplo restablecidos.");

      function openCancelGameModal() {
        openModal(`<p class="eyebrow">Partida en curso</p><h3>¿Salir sin guardar?</h3><p class="modal-copy">Se perderán las vidas actuales y la partida no aparecerá en el historial.</p><div class="modal-actions"><button class="btn btn-ghost" type="button" data-modal-action="close">Continuar partida</button><button class="btn btn-danger" type="button" data-modal-action="cancel-game">Salir sin guardar</button></div>`);
      }

      function cancelGame() { gameDraft = null; saveGameDraft(); closeModal(); go("home"); }

      function openCountersModal(targetId) {
        if (!gameDraft || gameDraft.stage !== "playing") return;
        const target = playerById(targetId);
        if (!target) return;
        const counters = ensureGameCounters()[targetId] || createCounterEntry();
        const standardCounter = (type, label, image) => `<div class="counter-row"><div class="counter-kind"><img src="${image}" alt=""><span>${label}</span></div><div class="counter-stepper"><button type="button" data-modal-action="change-counter" data-player-id="${targetId}" data-counter-type="${type}" data-delta="-1" aria-label="Restar ${label}">−</button><strong class="counter-value">${counters[type]}</strong><button type="button" data-modal-action="change-counter" data-player-id="${targetId}" data-counter-type="${type}" data-delta="1" aria-label="Sumar ${label}">+</button></div></div>`;
        const commanderSources = gameDraft.selectedIds.filter((sourceId) => sourceId !== targetId);
        const commanderRows = commanderSources.map((sourceId) => {
          const source = playerById(sourceId);
          const amount = Number(counters.commander?.[sourceId]) || 0;
          return `<div class="counter-row"><div class="counter-kind">${renderAvatar(source, "counter-source-avatar")}<span>Comandante de ${escapeHtml(source.name)}</span></div><div class="counter-stepper"><button type="button" data-modal-action="change-counter" data-player-id="${targetId}" data-counter-type="commander" data-source-id="${sourceId}" data-delta="-1" aria-label="Restar daño de comandante de ${escapeHtml(source.name)}">−</button><strong class="counter-value">${amount}</strong><button type="button" data-modal-action="change-counter" data-player-id="${targetId}" data-counter-type="commander" data-source-id="${sourceId}" data-delta="1" aria-label="Sumar daño de comandante de ${escapeHtml(source.name)}">+</button></div></div>`;
        }).join("");
        openModal(`<p class="eyebrow">Contadores</p><h3>${escapeHtml(target.name)}</h3><div class="counter-list">${standardCounter("poison", "Veneno", "assets/counters/VenenoContador.png")}${standardCounter("radiation", "Radiación", "assets/counters/RadiacionContador.png")}</div><p class="counter-section-title">Daño de comandante recibido</p><div class="counter-list">${commanderRows}</div><div class="modal-actions"><button class="btn btn-ghost" type="button" data-modal-action="close">Listo</button></div>`);
      }

      function changeGameCounter(targetId, type, delta, sourceId) {
        if (!gameDraft || gameDraft.stage !== "playing") return;
        const counters = ensureGameCounters()[targetId];
        if (!counters) return;
        if (type === "commander") {
          if (!sourceId) return;
          const next = Math.max(0, (Number(counters.commander[sourceId]) || 0) + Number(delta));
          if (next) counters.commander[sourceId] = next;
          else delete counters.commander[sourceId];
        } else if (type === "poison" || type === "radiation") {
          counters[type] = Math.max(0, (Number(counters[type]) || 0) + Number(delta));
        } else return;
        if (navigator.vibrate) navigator.vibrate(8);
        saveGameDraft();
        render();
        openCountersModal(targetId);
      }

      function openResultTypeModal() {
        openModal(`<p class="eyebrow">Paso final</p><h3>¿Qué tipo de resultado es?</h3><p class="modal-copy">Elige cómo quieres registrar esta partida. Podrás seleccionar el ganador en el siguiente paso.</p><div class="modal-choice-list"><button class="modal-choice" type="button" data-modal-action="choose-result" data-result="serious"><span><span class="modal-choice-label">Resultado serio</span><span class="modal-choice-sub">ELO activado · actualiza el ranking</span></span><span class="modal-choice-symbol" aria-hidden="true">↗</span></button><button class="modal-choice" type="button" data-modal-action="choose-result" data-result="friendly"><span><span class="modal-choice-label">Resultado amistoso</span><span class="modal-choice-sub">ELO desactivado · solo historial</span></span><span class="modal-choice-symbol" aria-hidden="true">♡</span></button></div><div class="modal-actions"><button class="btn btn-ghost" type="button" data-modal-action="close">Cancelar</button></div>`);
      }

      function chooseResultType(result) {
        gameDraft.resultType = result;
        closeModal();
        gameDraft.positions = gameDraft.positions || Object.fromEntries(gameDraft.selectedIds.map((id, index) => [id, index + 1]));
        saveGameDraft();
        openPositionsModal();
      }

      function openPositionsModal() {
        const options = gameDraft.selectedIds.map((id) => {
          const player = playerById(id);
          const position = Number(gameDraft.positions[id]) || 1;
          return `<div class="position-choice"><div class="position-player">${renderAvatar(player)}<div><strong>${escapeHtml(player.name)}</strong><span class="modal-choice-sub">${gameDraft.lives[id]} vidas</span></div></div><label class="sr-only" for="position-${id}">Posición de ${escapeHtml(player.name)}</label><select id="position-${id}" class="tier-select position-select" data-modal-action="set-position" data-player-id="${id}">${Array.from({ length: gameDraft.selectedIds.length }, (_, index) => index + 1).map((value) => `<option value="${value}" ${value === position ? "selected" : ""}>${value}º</option>`).join("")}</select></div>`;
        }).join("");
        openModal(`<p class="eyebrow">Resultado</p><h3>Posiciones finales</h3><div class="position-list">${options}</div><div class="modal-actions"><button class="btn btn-ghost" type="button" data-modal-action="back-to-result">← Atrás</button><button class="btn btn-primary" type="button" data-modal-action="confirm-positions">Guardar resultado</button></div>`);
      }

      function expectedScore(playerSecret, opponentSecret) {
        return 1 / (1 + Math.pow(10, (opponentSecret - playerSecret) / 400));
      }

      function weightedTierDelta(rawDelta, tier) {
        if (rawDelta > 0) return rawDelta * DECK_TIERS[tier].gain;
        if (rawDelta < 0) return rawDelta * DECK_TIERS[tier].loss;
        return 0;
      }

      function calculateEloChanges(positions) {
        const participants = gameDraft.selectedIds.map((id) => {
          const player = playerById(id);
          return {
            id,
            name: player.name,
            secret: Number(player.eloSecret) || ELO_CONFIG.initialSecret,
            tier: Number(gameDraft.tiers[id]) || 3,
            bonuses: gameDraft.bonuses[id] || createPlayerBonuses(),
            position: Number(positions[id]) || 1
          };
        });
        const changes = Object.fromEntries(participants.map((participant) => [participant.id, {
          playerId: participant.id,
          playerName: participant.name,
          position: participant.position,
          beforeSecret: participant.secret,
          beforeVisible: participant.secret - ELO_CONFIG.visibleOffset,
          tier: participant.tier,
          tierLabel: DECK_TIERS[participant.tier].label,
          pairDelta: 0,
          pairDetails: [],
          bonusBreakdown: { participation: 0, precon: 0, firstBlood: 0, noCommanderAbilities: 0 },
          bonusTotal: 0,
          delta: 0,
          afterSecret: participant.secret,
          afterVisible: participant.secret - ELO_CONFIG.visibleOffset
        }]));

        for (let leftIndex = 0; leftIndex < participants.length; leftIndex += 1) {
          for (let rightIndex = leftIndex + 1; rightIndex < participants.length; rightIndex += 1) {
            const left = participants[leftIndex];
            const right = participants[rightIndex];
            const leftActual = left.position < right.position ? 1 : left.position > right.position ? 0 : 0.5;
            const rightActual = 1 - leftActual;
            const leftExpected = expectedScore(left.secret, right.secret);
            const rightExpected = 1 - leftExpected;
            const leftRaw = ELO_CONFIG.k * (leftActual - leftExpected);
            const rightRaw = ELO_CONFIG.k * (rightActual - rightExpected);
            const leftDelta = weightedTierDelta(leftRaw, left.tier);
            const rightDelta = weightedTierDelta(rightRaw, right.tier);
            const leftResult = leftActual === 1 ? "victoria" : leftActual === 0 ? "derrota" : "empate";
            const rightResult = rightActual === 1 ? "victoria" : rightActual === 0 ? "derrota" : "empate";
            changes[left.id].pairDelta += leftDelta;
            changes[right.id].pairDelta += rightDelta;
            changes[left.id].pairDetails.push({ opponentId: right.id, opponentName: right.name, result: leftResult, expected: Number(leftExpected.toFixed(4)), rawDelta: Number(leftRaw.toFixed(2)), tierMultiplier: leftRaw >= 0 ? DECK_TIERS[left.tier].gain : DECK_TIERS[left.tier].loss, delta: Number(leftDelta.toFixed(2)) });
            changes[right.id].pairDetails.push({ opponentId: left.id, opponentName: left.name, result: rightResult, expected: Number(rightExpected.toFixed(4)), rawDelta: Number(rightRaw.toFixed(2)), tierMultiplier: rightRaw >= 0 ? DECK_TIERS[right.tier].gain : DECK_TIERS[right.tier].loss, delta: Number(rightDelta.toFixed(2)) });
          }
        }

        participants.forEach((participant) => {
          const change = changes[participant.id];
          if (participants.length >= 3) {
            change.bonusBreakdown.participation = 1;
            change.bonusBreakdown.precon = participant.bonuses.precon ? 1 : 0;
            change.bonusBreakdown.firstBlood = participant.bonuses.firstBlood ? 1 : 0;
            change.bonusBreakdown.noCommanderAbilities = participant.bonuses.noCommanderAbilities ? 2 : 0;
          }
          change.bonusTotal = Object.values(change.bonusBreakdown).reduce((sum, bonus) => sum + bonus, 0);
          change.delta = Math.round(change.pairDelta + change.bonusTotal);
          change.afterSecret = change.beforeSecret + change.delta;
          change.afterVisible = change.afterSecret - ELO_CONFIG.visibleOffset;
          const player = playerById(participant.id);
          player.eloSecret = change.afterSecret;
          player.eloVisible = change.afterVisible;
        });
        return changes;
      }

      function buildMatchStatistics(operations) {
        const changes = {};
        const ensure = (id) => {
          if (!changes[id]) changes[id] = { damageDealt: 0, damageReceived: 0, healingDone: 0, healingReceived: 0, biggestHit: 0 };
          return changes[id];
        };
        (operations || []).forEach((operation) => {
          const amount = Math.max(0, Number(operation.amount) || 0);
          if (!amount) return;
          const actor = ensure(operation.actorId);
          const target = ensure(operation.targetId);
          if (operation.sign < 0) {
            actor.damageDealt += amount;
            actor.biggestHit = Math.max(actor.biggestHit, amount);
            target.damageReceived += amount;
          } else {
            actor.healingDone += amount;
            target.healingReceived += amount;
          }
        });
        return changes;
      }

      function applyMatchStatistics(changes, multiplier = 1) {
        Object.entries(changes || {}).forEach(([id, change]) => {
          if (!state.statistics.players[id]) state.statistics.players[id] = createPlayerStats();
          const playerStats = state.statistics.players[id];
          ["damageDealt", "damageReceived", "healingDone", "healingReceived"].forEach((key) => { playerStats[key] = Math.max(0, Number(playerStats[key] || 0) + Number(change[key] || 0) * multiplier); });
          if (multiplier > 0) playerStats.biggestHit = Math.max(Number(playerStats.biggestHit || 0), Number(change.biggestHit || 0));
        });
      }

      function recalculateBiggestHits() {
        Object.values(state.statistics.players).forEach((stats) => { stats.biggestHit = 0; });
        state.matches.forEach((match) => Object.entries(match.statistics?.playerChanges || {}).forEach(([id, change]) => {
          if (!state.statistics.players[id]) state.statistics.players[id] = createPlayerStats();
          state.statistics.players[id].biggestHit = Math.max(Number(state.statistics.players[id].biggestHit || 0), Number(change.biggestHit || 0));
        }));
      }

      function updateHistoricalElo(changes) {
        Object.values(changes || {}).forEach((change) => {
          if (Number(change.afterVisible) > Number(state.statistics.highestElo.elo)) state.statistics.highestElo = { playerId: change.playerId, playerName: change.playerName, elo: Number(change.afterVisible) };
        });
      }

      function saveMatch() {
        const positions = Object.fromEntries(gameDraft.selectedIds.map((id) => [id, Number(gameDraft.positions[id]) || 1]));
        if (!Object.values(positions).includes(1)) positions[gameDraft.selectedIds[0]] = 1;
        const firstPlaceIds = gameDraft.selectedIds.filter((id) => positions[id] === 1);
        const winnerIds = firstPlaceIds.length ? firstPlaceIds : [gameDraft.selectedIds[0]];
        const winnerNames = winnerIds.map((id) => playerById(id).name);
        const matchPlayers = gameDraft.selectedIds.map((id) => ({ id, name: playerById(id).name, finalLife: gameDraft.lives[id], position: positions[id] }));
        const isSerious = gameDraft.resultType === "serious";
        const eloChanges = isSerious ? calculateEloChanges(positions) : {};
        const elo = isSerious ? { enabled: true, applied: true, changes: eloChanges, config: ELO_CONFIG, reversible: true } : { enabled: false, applied: false, changes: {}, config: ELO_CONFIG, reversible: true };
        const statisticChanges = buildMatchStatistics(gameDraft.lifeOperations);
        applyMatchStatistics(statisticChanges);
        if (isSerious) updateHistoricalElo(eloChanges);
        state.matches.push({
          id: uid("match"),
          playerIds: [...gameDraft.selectedIds],
          players: matchPlayers,
          positions,
          winnerId: winnerIds[0],
          winnerIds,
          winnerName: winnerNames.join(" · "),
          registeredBy: currentUser,
          resultType: gameDraft.resultType,
          tiers: Object.fromEntries(gameDraft.selectedIds.map((id) => [id, Number(gameDraft.tiers[id]) || 3])),
          bonuses: Object.fromEntries(gameDraft.selectedIds.map((id) => [id, gameDraft.bonuses[id] || createPlayerBonuses()])),
          elo,
          statistics: { playerChanges: statisticChanges },
          lifeOperations: (gameDraft.lifeOperations || []).map((operation) => ({ targetId: operation.targetId, actorId: operation.actorId, sign: operation.sign, amount: operation.amount })),
          counters: JSON.parse(JSON.stringify(ensureGameCounters())),
          planesWalked: Number(gameDraft.planesWalked) || 0,
          rankingNameAtTime: state.rankingName,
          startedAt: gameDraft.startedAt,
          finishedAt: new Date().toISOString()
        });
        saveState();
        gameDraft = null;
        closeModal();
        currentScreen = "history";
        render();
        showToast("Partida guardada en el historial.");
      }

      function openDeleteMatchModal(id) {
        const match = state.matches.find((item) => item.id === id);
        if (!match) return;
        openModal(`<p class="eyebrow">Borrar partida</p><h3>¿Borrar esta partida?</h3><p class="modal-copy">Se eliminará el resultado del ${formatDate(match.finishedAt)}. Cuando exista ELO, solo se desharán los movimientos ligados a esta partida; no se recalcularán las posteriores.</p><div class="modal-actions"><button class="btn btn-ghost" type="button" data-modal-action="close">Cancelar</button><button class="btn btn-danger" type="button" data-modal-action="confirm-delete-match" data-match-id="${id}">Sí, borrar</button></div>`);
      }

      function deleteMatch(id) {
        const match = state.matches.find((item) => item.id === id);
        if (match?.statistics?.playerChanges) applyMatchStatistics(match.statistics.playerChanges, -1);
        if (match?.elo?.enabled && match.elo.applied) {
          Object.values(match.elo.changes || {}).forEach((change) => {
            const player = playerById(change.playerId);
            if (!player) return;
            player.eloSecret = Math.round((Number(player.eloSecret) || ELO_CONFIG.initialSecret) - Number(change.delta || 0));
            player.eloVisible = player.eloSecret - ELO_CONFIG.visibleOffset;
          });
          match.elo.applied = false;
          match.elo.revertedAt = new Date().toISOString();
        }
        state.matches = state.matches.filter((item) => item.id !== id);
        recalculateBiggestHits();
        saveState();
        closeModal();
        render();
        showToast(match ? `Partida de ${match.winnerName} eliminada.` : "Partida eliminada.");
      }

      function openMatchDetails(id) {
        selectedMatchId = id;
        const match = state.matches.find((item) => item.id === id);
        if (!match) return;
        const serious = match.resultType === "serious";
        const lives = match.players.map((player) => { const position = player.position || match.positions?.[player.id] || "—"; return `<div class="life-result-row"><span>${position}º · ${escapeHtml(player.name)}</span><strong>${player.finalLife} vidas</strong></div>`; }).join("");
        const eloRows = serious && Object.keys(match.elo?.changes || {}).length ? Object.values(match.elo.changes).map((change) => `<div class="life-result-row"><span>${change.position || "—"}º · ${escapeHtml(change.playerName)} · ${escapeHtml(change.tierLabel || "Tier 3")}${change.bonusTotal ? ` · bonus +${change.bonusTotal}` : ""}</span><strong>${formatDelta(change.delta)} · ${formatElo(change.afterVisible)}</strong></div>`).join("") : `<p class="ranking-note">Este resultado no modificó el ELO.</p>`;
        const outcomeText = (match.winnerIds || []).length > 1 ? "empataron" : "ganó";
        openModal(`<p class="eyebrow">Detalle de partida</p><h3>${escapeHtml(match.winnerName)} ${outcomeText}</h3><div class="detail-table"><div class="detail-line"><span>Fecha y hora</span><strong>${formatDate(match.finishedAt)}</strong></div><div class="detail-line"><span>Registró</span><strong>${escapeHtml(match.registeredBy)}</strong></div><div class="detail-line"><span>Resultado</span><strong>${serious ? "Serio · ELO activado" : "Amistoso · ELO desactivado"}</strong></div><div class="detail-line"><span>Ranking</span><strong>${escapeHtml(match.rankingNameAtTime || state.rankingName)}</strong></div></div><h4 class="detail-subheading">Posiciones y vidas</h4>${lives}<h4 class="detail-subheading">Movimiento ELO</h4>${eloRows}<div class="modal-actions"><button class="btn btn-ghost" type="button" data-modal-action="close">Cerrar</button><button class="btn btn-danger" type="button" data-modal-action="confirm-delete-from-detail" data-match-id="${id}">Borrar partida</button></div>`);
      }

      function openModal(content) {
        modalRoot.innerHTML = `<div class="modal-backdrop" role="presentation"><div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">${content}</div></div>`;
        modalRoot.querySelector(".modal-backdrop").addEventListener("click", (event) => { if (event.target.classList.contains("modal-backdrop")) closeModal(); });
        modalRoot.querySelectorAll('[data-modal-action]').forEach((button) => button.addEventListener("click", () => {
          const action = button.dataset.modalAction;
          if (action === "close") closeModal();
          if (action === "choose-result") chooseResultType(button.dataset.result);
          if (action === "confirm-positions") saveMatch();
          if (action === "back-to-result") { closeModal(); openResultTypeModal(); }
          if (action === "confirm-delete-player") deletePlayer(button.dataset.playerId);
          if (action === "confirm-delete-plane") deletePlane(button.dataset.groupId, button.dataset.planeId);
          if (action === "confirm-delete-group") deleteGroup(button.dataset.groupId);
          if (action === "confirm-delete-match" || action === "confirm-delete-from-detail") deleteMatch(button.dataset.matchId);
          if (action === "cancel-game") cancelGame();
          if (action === "reset-demo") resetDemo();
          if (action === "change-counter") changeGameCounter(button.dataset.playerId, button.dataset.counterType, Number(button.dataset.delta), button.dataset.sourceId);
        }));
        modalRoot.querySelectorAll('[data-modal-action="set-position"]').forEach((select) => select.addEventListener("change", () => {
          gameDraft.positions[select.dataset.playerId] = Number(select.value);
          saveGameDraft();
          openPositionsModal();
        }));
        modalRoot.querySelector(".modal")?.querySelector("button, input, textarea")?.focus();
      }

      function closeModal() { modalRoot.innerHTML = ""; selectedMatchId = null; }

      function showToast(message, error = false) {
        const toast = document.createElement("div");
        toast.className = `toast${error ? " error" : ""}`;
        toast.textContent = message;
        toastRegion.appendChild(toast);
        window.setTimeout(() => toast.remove(), 3200);
      }

      window.addEventListener("storage", (event) => {
        if (event.key !== STORAGE_KEY || !event.newValue) return;
        try {
          state = normalizeState(JSON.parse(event.newValue));
          if (currentUser && !state.players.some((player) => player.name === currentUser)) {
            currentUser = null;
            sessionStorage.clear();
          }
          render();
        } catch (_) { /* se conserva el estado local actual */ }
      });

      render();
      initializeRemoteSync();
    })();
  </script>
</body>
</html>
